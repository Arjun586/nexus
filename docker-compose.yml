services:
  postgres:
    image: postgres:17
    container_name: nexus-postgres

    environment:
      POSTGRES_USER: nexus_user
      POSTGRES_PASSWORD: nexus@123
      POSTGRES_DB: nexus

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  
  redis:
        image: redis:7-alpine
        container_name: nexus-redis
        restart: unless-stopped

        ports:
            - "6379:6379"

        volumes:
            - redis-data:/data

volumes:
  postgres-data:
  redis-data: